project:
  name: millikan_ai
  run_root: runs

video:
  sample_frames: 8
  diagnostics_dir: diagnostics

roi:
  microscope_roi: null
  voltage_roi: null
  screen_corners: null

calibration:
  measurement_distance_m: 0.0015
  min_grid_lines: 4

segment:
  stable_min_duration_s: 2.0
  transient_drop_s: 0.5
  min_valid_points: 45
  max_missing_ratio: 0.15
  min_fit_r2: 0.90
  min_motion_displacement_px: 8

tracking:
  top_k_seeds: 30
  seed_sample_frames: 6
  seed_merge_distance_px: 18
  seed_min_grid_line_distance_px: 0
  max_drops: 20
  multi_drop_min_trajectory_distance_px: 20
  max_search_radius_px: 35
  max_missing_frames: 15
  min_blob_area_px: 3
  max_blob_area_px: 180
  detection_nms_distance_px: 6
  kalman_process_noise: 1.0
  kalman_measurement_noise: 2.0
  mahalanobis_gate: 6.0
  max_area_ratio: 3.0
  lk_window_size_px: 21
  lk_pyramid_levels: 3
  lk_max_forward_backward_error_px: 1.5
  lk_max_photometric_error: 30
  lk_detection_gate_px: 12
  lk_prediction_gate_px: 12
  lk_measurement_weight: 0.25
  best_track_min_score: 0.45
  restrict_to_measurement_grid: true
  min_grid_line_distance_px: 8
  min_grid_clear_fraction: 0.60
  min_tracking_roi_margin_px: 20
  min_roi_clear_fraction: 0.70

physics:
  voltage_sign: 1
  plate_distance_m: 0.005
  oil_density_kg_m3: 981.0
  air_viscosity_Pa_s: 0.0000181
  pressure_Pa: 101325.0
  cunningham_b_Pa_m: 0.0000082
  gravity_m_s2: 9.80665
  radius_tolerance_m: 1.0e-12
  max_radius_iterations: 80

elementary:
  min_drops: 3
  e_min_C: 0.5e-19
  e_max_C: 2.5e-19
  grid_points: 800
  bootstrap_samples: 50
  random_seed: 42

quality:
  mode: mock_rule_adapter
  model_version: rules-v1
  quality_threshold: 0.60
  thresholds:
    max_missing_ratio: 0.40
    min_duration_s: 1.0
    target_duration_s: 3.0
    min_platforms: 2
    min_speed_fit_r2: 0.75
    max_frame_jump_px: 12
    max_area_cv: 0.45
  trajectory_weights:
    tracking: 0.20
    continuity: 0.15
    duration: 0.10
    platforms: 0.20
    fit: 0.20
    drift: 0.05
    grid_clear: 0.05
    roi_clear: 0.05
  stage_weights:
    trajectory: 0.55
    physics: 0.45

output:
  voltage_samples_csv: voltage_samples.csv
  platforms_csv: platforms.csv
  best_track_csv: best_track.csv
  drop_tracks_csv: drop_tracks.csv
  best_track_segments_csv: best_track_segments.csv
  drop_track_segments_csv: drop_track_segments.csv
  candidate_tracks_summary_csv: candidate_tracks_summary.csv
  trajectory_quality_scores_csv: trajectory_quality_scores.csv
  diagnostics_json: diagnostics.json
  drop_results_json: drop_results.json
  multi_drop_results_json: multi_drop_results.json
  quality_scores_json: quality_scores.json
  elementary_charge_result_json: elementary_charge_result.json
  validity_report_json: validity_report.json
  visualization_layers_json: visualization_layers.json
  diagnostic_overlay_jpg: diagnostic_overlay.jpg
  overlay_mp4: overlay_best_track.mp4
  run_manifest_json: run_manifest.json
  summary_txt: summary.txt
  analysis_report_md: analysis_report.md
